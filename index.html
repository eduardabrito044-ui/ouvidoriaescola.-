<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ouvidoria Escolar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesh-bg"></div>

    <nav class="sidebar glass">
        <h2>Menu Escolar</h2>
        <button onclick="mudarAba('forum')">💬 Chat de Alunos</button>
        <button onclick="mudarAba('mural')">💡 Mural de Ideias</button>
        <button onclick="mudarAba('sentimentos')">🎭 Humor do Dia</button>
        <button onclick="mudarAba('feedback')">🏫 Sobre a Escola</button>
        <button onclick="mudarAba('contatos')">📞 Contatos</button>
    </nav>

    <main class="main-content">
        <section id="forum" class="aba active glass">
            <h2>💬 Chat da Escola</h2>
            <div id="feed-forum" class="feed"></div>
            <div class="input-area">
                <input type="text" id="input-msg" placeholder="Escreva uma mensagem e aperte Enter...">
                <button onclick="salvarMensagem()">Enviar</button>
            </div>
        </section>

        <section id="mural" class="aba glass">
            <h2>💡 Mural de Sugestões</h2>
            <div id="feed-mural" class="feed"></div>
            <div class="input-area">
                <input type="text" id="input-ideia" placeholder="Sua ideia para a escola...">
                <button onclick="salvarIdeia()">Sugerir</button>
            </div>
        </section>

        <section id="sentimentos" class="aba glass text-center">
            <h2>🎭 Como a escola está hoje?</h2>
            <p>Vote no seu humor atual!</p>
            <div class="emoji-grid">
                <button onclick="votarHumor('feliz')">😊</button>
                <button onclick="votarHumor('triste')">😢</button>
                <button onclick="votarHumor('cansado')">😴</button>
            </div>
        </section>

        <section id="feedback" class="aba glass">
            <h2>🏫 Opinião sobre a Escola</h2>
            <textarea id="texto-feedback" placeholder="O que você mudaria na escola?"></textarea>
            <button onclick="enviarFeedback()">Enviar para Coordenação</button>
        </section>

        <section id="contatos" class="aba glass">
            <h2>📞 Falar com a Eduarda</h2>
            <div class="contatos-grid">
                <a href="https://wa.me/5589981259467" target="_blank" class="btn-contato wa">WhatsApp</a>
                <a href="https://instagram.com/m.eduarda.brito25" target="_blank" class="btn-contato ig">Instagram</a>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
