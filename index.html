<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ouvidoria - CETI José Marques</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mesh-bg"></div>

<nav class="sidebar glass">
    <div class="logo-container">
        <img src="logo.png" alt="Logo Escola">
    </div>

    <h2>Menu Escolar</h2>
    <button onclick="mudarAba('forum')">💬 Chat de Alunos</button>
    <button onclick="mudarAba('mural')">💡 Mural de Ideias</button>
    <button onclick="mudarAba('cronograma')">📅 Cronograma</button> 
    <button onclick="mudarAba('sentimentos')">🎭 Humor do Dia</button>
    <button onclick="mudarAba('feedback')">🏫 Sobre a Escola</button>
    <button onclick="mudarAba('contatos')">📞 Contatos</button>
</nav>

<main class="main-content">

<!-- CHAT -->
<section id="forum" class="aba active glass chat-container">
    <h2>💬 Chat da Escola</h2>

    <div id="feed-forum" class="feed"></div>

    <div class="input-area-container">
        <div id="reply-preview" style="display:none;">
            <small id="reply-user"></small>
            <p id="reply-text"></p>
            <button onclick="cancelarResposta()">X</button>
        </div>

        <div class="input-area">
            <input type="text" id="input-msg" placeholder="Escreva uma mensagem...">
            <button onclick="salvarMensagem()">Enviar</button>
        </div>
    </div>
</section>

<!-- MURAL -->
<section id="mural" class="aba glass">
    <h2>💡 Mural de Sugestões</h2>

    <div id="feed-mural" class="feed"></div>

    <div class="input-area">
        <input type="text" id="input-ideia" placeholder="Sua ideia...">
        <button onclick="salvarIdeia()">Sugerir</button>
    </div>
</section>

<!-- CRONOGRAMA -->
<section id="cronograma" class="aba glass">
    <h2>📅 Eventos Importantes 2026</h2>
    <div class="cronograma-grid">
        <div class="card-evento">
            <span class="data-badge">Maio</span>
            <h3>OBMEP - 1ª Fase</h3>
            <p>📍 Salas de aula</p>
        </div>
        <div class="card-evento">
            <span class="data-badge">Agosto</span>
            <h3>Feira de Ciências</h3>
            <p>📍 Quadra</p>
        </div>
    </div>
</section>

<!-- SENTIMENTOS (EMOJIS MANTIDOS) -->
<section id="sentimentos" class="aba glass text-center">
    <h2>🎭 Como a escola está hoje?</h2>
    <div class="emoji-grid">
        <button onclick="votarHumor('feliz')">😊</button>
        <button onclick="votarHumor('triste')">😢</button>
        <button onclick="votarHumor('cansado')">😴</button>
        <button onclick="votarHumor('estudioso')">🤓</button>
        <button onclick="votarHumor('animado')">🤩</button>
        <button onclick="votarHumor('bravo')">😡</button>
        <button onclick="votarHumor('apaixonado')">🥰</button>
        <button onclick="votarHumor('tranquilo')">😎</button>
        <button onclick="votarHumor('sobrecarregado')">🤯</button>
        <button onclick="votarHumor('nervoso')">🤡</button>
    </div>
</section>

<!-- FEEDBACK -->
<section id="feedback" class="aba glass">
    <h2>🏫 Opinião sobre a Escola</h2>
    <textarea id="texto-feedback"></textarea>
    <button onclick="enviarFeedback()">Enviar</button>
</section>

<!-- CONTATOS -->
<section id="contatos" class="aba glass">
    <h2>📞 Contatos</h2>
    <a href="https://wa.me/5589981259467" target="_blank">WhatsApp</a>
    <a href="https://instagram.com/m.eduarda.brito25" target="_blank">Instagram</a>
</section>

</main>

<script type="module" src="script.js"></script>
</body>
    </html>
