<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI JM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <nav class="top-menu">
        <div class="menu-scroll">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Mural</button>
            <button id="btn-avisos" onclick="mudarAba('avisos')">📢 Avisos</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">📩 Opinião</button>
            <button id="btn-cronograma" onclick="mudarAba('cronograma')">📅 Agenda</button>
            <button id="btn-contatos" onclick="mudarAba('contatos')">📱 Contatos</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="chat-header-info">
                <img src="logo.png" class="chat-avatar">
                <div class="chat-status">
                    <h2>Direct CETI JM</h2>
                    <span>Online</span>
                </div>
            </div>
            <div id="feed-forum" class="feed"></div>
            <div class="footer-input">
                <div id="reply-preview" class="reply-container">
                    <div class="reply-content"><small id="reply-user"></small><p id="reply-text"></p></div>
                    <button onclick="cancelarResposta()">✕</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                    <button class="send-link" onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div id="feed-mural" class="feed"></div>
            <div class="footer-input">
                <div class="input-wrapper">
                    <input type="text" id="input-ideia" placeholder="Nova ideia...">
                    <button class="send-link" onclick="salvarIdeia()">Postar</button>
                </div>
            </div>
        </section>

        <section id="feedback" class="aba">
            <div class="p-20">
                <h2 style="margin-bottom:15px">Sua Opinião</h2>
                <textarea id="texto-feedback" placeholder="Escreva aqui..."></textarea>
                <button onclick="enviarFeedback()" class="insta-btn">Enviar para Eduarda</button>
            </div>
        </section>

        <section id="cronograma" class="aba">
            <div class="p-20">
                <h2 class="gold-text">🏆 Olimpíadas</h2>
                <div class="card-gold">🥇 01/05 - Abertura Oficial</div>
                <div class="card-gold">🏅 05/05 - Início das Competições</div>
                <h2 style="margin-top:20px">📅 Agenda Geral</h2>
                <div class="card-simple">20/05 - Entrega de Trabalhos</div>
            </div>
        </section>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
