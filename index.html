<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI José Marques</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <aside class="sidebar">
        <div class="logo-container">
            <img src="https://github.com/Eduardabrito044-ui/ouvidoriaescola/raw/main/logo.png" alt="Logo" class="school-logo">
            <h1>Ouvidoria</h1>
        </div>
        <nav class="nav-buttons">
            <button onclick="mudarAba('forum', event)" class="active-btn">Chat</button>
            <button onclick="mudarAba('mural', event)">Mural</button>
            <button onclick="mudarAba('humor', event)">Humor</button>
            <button onclick="mudarAba('avisos', event)">Avisos</button>
            <button onclick="mudarAba('feedback', event)">Opinião</button>
        </nav>
    </aside>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="content-wrapper">
                <div class="header-fixo">Direct dos Alunos</div>
                <div id="feed-forum" class="feed"></div>
                <div class="footer-input">
                    <div class="input-container">
                        <input type="text" id="input-chat" placeholder="Digite uma mensagem...">
                        <button class="send-btn" onclick="enviarMensagem()">Enviar</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="feedback" class="aba">
            <div class="content-wrapper">
                <div class="header-fixo">Tua Opinião</div>
                <div class="feedback-container">
                    <p>Como podemos melhorar nossa escola?</p>
                    <textarea id="texto-feedback" placeholder="Escreva sua sugestão ou crítica aqui..."></textarea>
                    <button class="btn-insta" onclick="enviarFeedback()">Enviar para a Escola</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div class="content-wrapper">
                <div class="header-fixo">Mural de Ideias</div>
                <div id="feed-mural" class="feed">
                    <p style="text-align:center; padding:20px; opacity:0.5;">Nenhuma ideia postada ainda.</p>
                </div>
            </div>
        </section>
    </main>

    <button id="theme-toggle-fixed" onclick="toggleTheme()">🌓</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
