<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Ouvidoria - CETI José Marques</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesh-bg"></div>

    <nav class="sidebar glass">
        <div class="logo-container">
            <img src="logo.png" alt="Logo">
        </div>
        <div class="nav-buttons">
            <button onclick="mudarAba('forum')">💬 Chat</button>
            <button onclick="mudarAba('mural')">💡 Mural</button>
            <button onclick="mudarAba('cronograma')">📅 Datas</button> 
            <button onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button onclick="mudarAba('feedback')">🏫 Opinião</button>
            <button onclick="mudarAba('contatos')">📞 Contatos</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="header-fixo glass"><h2>💬 Chat de Alunos</h2></div>
            <div id="feed-forum" class="feed"></div>
            
            <div class="footer-input glass">
                <div id="reply-preview" style="display: none;">
                    <div class="reply-info">
                        <small id="reply-user"></small>
                        <p id="reply-text"></p>
                    </div>
                    <button class="btn-x" onclick="cancelarResposta()">X</button>
                </div>
                <div class="input-group">
                    <input type="text" id="input-msg" placeholder="Digite sua mensagem...">
                    <button onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div class="header-fixo glass"><h2>💡 Mural de Sugestões</h2></div>
            <div id="feed-mural" class="feed-simples"></div>
            <div class="footer-input glass">
                <div class="input-group">
                    <input type="text" id="input-ideia" placeholder="Sua sugestão ou ideia...">
                    <button onclick="salvarIdeia()">Sugerir</button>
                </div>
            </div>
        </section>

        <section id="cronograma" class="aba">
            <div class="header-fixo glass"><h2>📅 Cronograma 2026</h2></div>
            <div class="content-scroll glass">
                <div class="card"><span>MAIO</span><h3>OBMEP - 1ª Fase</h3></div>
                <div class="card"><span>AGOSTO</span><h3>Feira de Ciências</h3></div>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="header-fixo glass"><h2>🎭 Humor da Escola</h2></div>
            <div class="content-scroll glass">
                <div class="emoji-grid">
                    <button onclick="votarHumor('Feliz 😊')">😊</button>
                    <button onclick="votarHumor('Cansado 😴')">😴</button>
                    <button onclick="votarHumor('Estudioso 🤓')">🤓</button>
                    <button onclick="votarHumor('Animado 🤩')">🤩</button>
                    <button onclick="votarHumor('Bravo 😡')">😡</button>
                    <button onclick="votarHumor('Apaixonado 🥰')">🥰</button>
                </div>
            </div>
        </section>

        <section id="feedback" class="aba">
            <div class="header-fixo glass"><h2>🏫 Feedback</h2></div>
            <div class="content-scroll glass">
                <textarea id="texto-feedback" placeholder="O que você acha da escola?"></textarea>
                <button class="btn-env" onclick="enviarFeedback()">Enviar Feedback</button>
            </div>
        </section>

        <section id="contatos" class="aba">
            <div class="header-fixo glass"><h2>📞 Contatos</h2></div>
            <div class="content-scroll glass">
                <a href="https://wa.me/5589981259467" class="btn-lk wa">WhatsApp</a>
                <a href="https://instagram.com/m.eduarda.brito25" class="btn-lk ig">Instagram</a>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
