<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Portal Elite - CETI JM</title>
    <style>
        :root {
            --bg: #ffffff; --text: #051d3b; --primary: #18447e; 
            --accent: #2e7d32; --msg-me: #3797f0; --msg-outro: #f2f3f5; --border: #dbdbdb;
            --gold: #ffd700; --insta-blue: #0095f6; --coord: #fff3cd; --coord-border: #ffcc00;
        }

        body.dark-mode {
            --bg: #051d3b; --text: #ffffff; 
            --msg-me: #0095f6; --msg-outro: #1a3a5f; --border: #2a4a6f;
            --coord: #2d2d00; --coord-border: #ffff00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s; }

        /* HEADER E MENU */
        .top-menu { background: var(--primary); padding: 10px 0; border-bottom: 1px solid var(--border); z-index: 1000; }
        .menu-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 0 15px; scrollbar-width: none; }
        .menu-scroll::-webkit-scrollbar { display: none; }
        .menu-scroll button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-weight: 600; font-size: 13px; cursor: pointer; }
        .menu-scroll button.active-btn { background: white; color: var(--primary); }

        .header-elite { 
            display: flex; align-items: center; padding: 10px 15px; 
            background: linear-gradient(90deg, #18447e 0%, #2e7d32 100%); color: white; gap: 12px;
        }
        .logo-fixa { width: 42px; height: 42px; border-radius: 50%; border: 2px solid white; }

        /* MENSAGENS E BALÕES */
        .main-content { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .aba { display: none; height: 100%; flex-direction: column; }
        .aba.active { display: flex; }
        .feed { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 110px; }

        .msg-container { display: flex; flex-direction: column; max-width: 85%; margin-bottom: 5px; position: relative; }
        .me { align-self: flex-end; align-items: flex-end; }
        .outro { align-self: flex-start; align-items: flex-start; }
        
        .user-name { font-size: 11px; font-weight: 700; margin-bottom: 2px; color: var(--insta-blue); display: block; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; position: relative; border: 2px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-width: 60px; }
        
        .me .bubble { background: var(--msg-me); color: white; border-bottom-right-radius: 4px; border-color: rgba(255,255,255,0.1); }
        .outro .bubble { background: var(--msg-outro); color: var(--text); border-bottom-left-radius: 4px; border: 2px solid var(--border); }

        /* HORA NO CANTO */
        .msg-time { font-size: 9px; opacity: 0.6; align-self: flex-end; margin-top: 2px; }
        .me .msg-time { color: #eee; }

        /* ESTILO RESPOSTA DENTRO DA BOLHA */
        .reply-content { background: rgba(0,0,0,0.05); padding: 5px 8px; border-left: 3px solid var(--insta-blue); border-radius: 4px; font-size: 11px; margin-bottom: 5px; opacity: 0.8; }
        .dark-mode .reply-content { background: rgba(255,255,255,0.1); }

        /* PREVIA DE RESPOSTA EM CIMA DA BARRA */
        .reply-preview { background: var(--msg-outro); padding: 8px 15px; border-top: 1px solid var(--border); display: none; align-items: center; justify-content: space-between; font-size: 12px; }

        /* ESTILO COORDENAÇÃO */
        .coord-msg .bubble { background: var(--coord) !important; border: 2px solid var(--coord-border) !important; color: var(--text) !important; font-weight: 500; }

        /* RANKING MURAL */
        .ranking-top { order: -1; }
        .ranking-top .bubble { border: 3px solid var(--gold) !important; box-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .vote-btn { background: rgba(237, 73, 86, 0.1); border: 1px solid #ed4956; border-radius: 10px; color: #ed4956; padding: 4px 10px; font-size: 12px; margin-top: 5px; cursor: pointer; font-weight: bold; }

        /* BARRA INSTAGRAM FIXA */
        .footer-input { position: fixed; bottom: 0; width: 100%; background: var(--bg); padding: 5px 12px calc(20px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); z-index: 9999; }
        .insta-bar { display: flex; align-items: center; gap: 10px; max-width: 600px; margin: 0 auto; }
        .cam-btn { background: var(--insta-blue); color: white; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .input-box { flex: 1; border: 1px solid var(--border); border-radius: 25px; display: flex; align-items: center; padding: 0 15px; background: transparent; }
        .input-box input { flex: 1; border: none; background: transparent; outline: none; padding: 12px 0; color: var(--text); font-size: 15px; }
        .send-btn { background: none; border: none; color: var(--insta-blue); font-weight: 700; cursor: pointer; padding: 5px; font-size: 16px; }

        .fab-theme { position: fixed; bottom: 120px; left: 20px; width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: white; border: none; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; font-size: 20px; }
    </style>
</head>
<body class="light-mode">

    <nav class="top-menu">
        <div class="menu-scroll">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Mural</button>
            <button id="btn-avisos" onclick="mudarAba('avisos')">📢 Alertas</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-agenda" onclick="mudarAba('agenda')">📅 Cronograma</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">🏫 Opinião</button>
        </div>
    </nav>

    <header class="header-elite">
        <img src="logo.png" class="logo-fixa" onerror="this.src='https://via.placeholder.com/40'">
        <h2 style="font-size: 18px;">CETI José Marques</h2>
    </header>

    <main class="main-content">
        <section id="forum" class="aba active"><div id="feed-forum" class="feed"></div></section>
        <section id="mural" class="aba"><div id="feed-mural" class="feed"></div></section>
        <section id="avisos" class="aba"><div id="feed-avisos" class="feed"></div></section>
        <section id="sentimentos" class="aba"><div id="feed-humor" class="feed"></div></section>
        <section id="agenda" class="aba"><div id="feed-agenda" class="feed"></div></section>
        <section id="feedback" class="aba"><div class="feed"><textarea id="texto-feedback" style="width:100%; height:150px; border-radius:15px; padding:15px; border:1px solid var(--border); outline:none; background:var(--msg-outro); color:var(--text);" placeholder="Sua opinião..."></textarea></div></section>

        <div class="footer-input">
            <div id="reply-preview" class="reply-preview">
                <span id="reply-text">Respondendo...</span>
                <span onclick="cancelarResposta()" style="cursor:pointer; font-weight:bold;">✕</span>
            </div>
            <div class="insta-bar">
                <div class="cam-btn">📷</div>
                <div class="input-box">
                    <input type="text" id="master-input" placeholder="Escreva uma mensagem...">
                </div>
                <button class="send-btn" onclick="executarAcao()">Enviar</button>
            </div>
        </div>
    </main>

    <button class="fab-theme" onclick="toggleTheme()">🌓</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdlHar22iODe81f-nrUi06PLWKQReb9Gc",
            authDomain: "siteescolaeduarda.firebaseapp.com",
            databaseURL: "https://siteescolaeduarda-default-rtdb.firebaseio.com",
            projectId: "siteescolaeduarda"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let nome = localStorage.getItem("nome") || prompt("Qual seu nome?") || "Aluno";
        localStorage.setItem("nome", nome);
        
        let abaAtual = 'forum';
        let dadosResposta = null;

        window.mudarAba = (id) => {
            abaAtual = id;
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.menu-scroll button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active-btn');
        };

        window.toggleTheme = () => document.body.classList.toggle('dark-mode');

        // FUNCAO PARA RESPONDER
        window.prepararResposta = (msg, autor) => {
            dadosResposta = { msg, autor };
            document.getElementById('reply-text').innerText = `Respondendo a ${autor}...`;
            document.getElementById('reply-preview').style.display = 'flex';
            document.getElementById('master-input').focus();
        };

        window.cancelarResposta = () => {
            dadosResposta = null;
            document.getElementById('reply-preview').style.display = 'none';
        };

        window.executarAcao = () => {
            const input = document.getElementById('master-input');
            const txt = input.value.trim();
            if (!txt) return;

            const dadosMsg = {
                nome,
                texto: txt,
                timestamp: serverTimestamp(),
                resposta: dadosResposta ? dadosResposta : null
            };

            if (abaAtual === 'forum') {
                push(ref(db, "mensagens"), dadosMsg);
            } else if (abaAtual === 'mural') {
                push(ref(db, "ideias"), { ...dadosMsg, votos: 0 });
            } else if (abaAtual === 'avisos' || abaAtual === 'agenda') {
                const p = prompt("Chave Chernobyl:");
                if(p === "Chernobyl") push(ref(db, abaAtual), { texto: txt, nome: "COORDENAÇÃO", timestamp: serverTimestamp() });
            }
            
            input.value = "";
            cancelarResposta();
        };

        // DESENHAR MENSAGENS COM NOME, HORA E RESPONDER
        onValue(ref(db, "mensagens"), snap => {
            const feed = document.getElementById("feed-forum"); feed.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const data = d.timestamp ? new Date(d.timestamp) : new Date();
                const hora = data.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const div = document.createElement("div");
                div.className = `msg-container ${d.nome === nome ? 'me' : 'outro'}`;
                div.onclick = () => prepararResposta(d.texto, d.nome); // Clicar na msg para responder

                div.innerHTML = `
                    <span class="user-name">${d.nome}</span>
                    <div class="bubble">
                        ${d.resposta ? `<div class="reply-content"><b>${d.resposta.autor}</b><br>${d.resposta.msg}</div>` : ''}
                        ${d.texto}
                        <div class="msg-time">${hora}</div>
                    </div>
                `;
                feed.appendChild(div);
            });
            feed.scrollTop = feed.scrollHeight;
        });

        // MURAL E COORDENAÇÃO (Simplificado)
        onValue(ref(db, "ideias"), snap => {
            const feed = document.getElementById("feed-mural"); feed.innerHTML = "";
            let ideias = [];
            snap.forEach(c => { ideias.push({key: c.key, ...c.val()}); });
            ideias.sort((a, b) => b.votos - a.votos);
            ideias.forEach((d, i) => {
                const div = document.createElement("div");
                div.className = `msg-container outro ${i === 0 && d.votos > 0 ? 'ranking-top' : ''}`;
                div.innerHTML = `<span class="user-name">${i === 0 && d.votos > 0 ? '👑 ' : ''}${d.nome}</span><div class="bubble">${d.texto}</div><button class="vote-btn" onclick="votar('${d.key}')">❤️ ${d.votos || 0}</button>`;
                feed.appendChild(div);
            });
        });

        window.votar = (key) => update(ref(db, `ideias/${key}`), { votos: increment(1) });

        const carregarCoord = (path, feedId) => {
            onValue(ref(db, path), snap => {
                const f = document.getElementById(feedId); f.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    const div = document.createElement("div");
                    div.className = "msg-container outro coord-msg";
                    div.innerHTML = `<span class="user-name">COORDENAÇÃO</span><div class="bubble">${d.texto}</div>`;
                    f.appendChild(div);
                });
            });
        };
        carregarCoord("avisos", "feed-avisos");
        carregarCoord("agenda", "feed-agenda");

    </script>
</body>
</html>
