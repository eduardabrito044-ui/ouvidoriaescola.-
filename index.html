<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI José Marques</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <nav class="sidebar">
        <div class="logo-container">
            <img src="logo.png" alt="Logo Escola" class="school-logo">
            <h1>Ouvidoria</h1>
        </div>
        <div class="nav-buttons">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Mural</button>
            <button id="btn-avisos" onclick="mudarAba('avisos')">📢 Avisos</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">🏫 Opinião</button>
            <button id="btn-cronograma" onclick="mudarAba('cronograma')">📅 Cronograma</button>
        </div>
    </nav>

    <button onclick="toggleTheme()" id="theme-toggle-fixed">🌓</button>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="header-fixo"><h2>Direct dos Alunos</h2></div>
            <div id="feed-forum" class="feed"></div>
            <div class="footer-input">
                <div id="reply-preview" style="display: none; background: var(--card); padding: 8px; border-left: 3px solid var(--verde); margin-bottom: 5px; border-radius: 8px; justify-content: space-between; align-items: center;">
                    <div style="overflow: hidden;">
                        <small id="reply-user" style="color: var(--verde); font-weight: 800; font-size: 0.7rem;"></small>
                        <p id="reply-text" style="font-size: 0.8rem; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
                    </div>
                    <button onclick="cancelarResposta()" style="background:none; border:none; color:var(--text); font-weight:800; cursor:pointer;">✕</button>
                </div>
                <div class="input-container">
                    <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                    <button class="send-btn" onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div class="header-fixo"><h2>Mural de Ideias</h2></div>
            <div id="feed-mural" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-ideia" placeholder="Dar uma sugestão...">
                    <button class="send-btn" onclick="salvarIdeia()">Sugerir</button>
                </div>
            </div>
        </section>

        <section id="avisos" class="aba">
            <div class="header-fixo"><h2>📢 Avisos Oficiais</h2></div>
            <div id="feed-avisos" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-aviso" placeholder="Postar aviso oficial...">
                    <button class="send-btn" onclick="salvarAviso()">Postar</button>
                </div>
            </div>
        </section>

        <section id="cronograma" class="aba">
            <div class="header-fixo"><h2>Cronograma Escolar</h2></div>
            <div class="content-scroll">
                <div class="item-evento olympics">🏆 01/05 - Abertura das Olimpíadas (CETI)</div>
                <div class="item-evento">📅 20/05 - Feira de Empreendedorismo</div>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="header-fixo"><h2>Como estás hoje?</h2></div>
            <div class="emoji-grid">
                <button onclick="votarHumor('😊')">😊</button>
                <button onclick="votarHumor('😴')">😴</button>
                <button onclick="votarHumor('🤓')">🤓</button>
                <button onclick="votarHumor('😡')">😡</button>
            </div>
        </section>

        <section id="feedback" class="aba">
            <div class="header-fixo"><h2>A tua opinião</h2></div>
            <div class="content-scroll">
                <textarea id="texto-feedback" placeholder="Escreva seu feedback..."></textarea>
                <button class="btn-insta" onclick="enviarFeedback()">Enviar Feedback</button>
            </div>
        </section>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
