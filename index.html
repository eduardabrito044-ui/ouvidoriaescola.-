<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Portal Elite - CETI JM</title>
    <style>
        :root {
            --bg: #ffffff; --text: #051d3b; --primary: #18447e; 
            --accent: #2e7d32; --msg-me: #3797f0; --msg-outro: #f2f3f5; --border: #dbdbdb;
            --gold: #ffd700; --insta-blue: #0095f6; --coord: #fff3cd; --coord-border: #ffcc00;
        }

        body.dark-mode {
            --bg: #051d3b; --text: #ffffff; 
            --msg-me: #0095f6; --msg-outro: #1a3a5f; --border: #2a4a6f;
            --coord: #2d2d00; --coord-border: #ffff00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s; }

        /* HEADER E MENU */
        .top-menu { background: var(--primary); padding: 10px 0; border-bottom: 1px solid var(--border); z-index: 1000; }
        .menu-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 0 15px; scrollbar-width: none; }
        .menu-scroll button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 16px; border-radius: 20px; white-space: nowrap; font-weight: 600; font-size: 13px; cursor: pointer; }
        .menu-scroll button.active-btn { background: white; color: var(--primary); }

        .header-elite { 
            display: flex; align-items: center; padding: 10px 15px; 
            background: linear-gradient(90deg, #18447e 0%, #2e7d32 100%); color: white; gap: 12px;
        }
        .logo-fixa { width: 42px; height: 42px; border-radius: 50%; border: 2px solid white; }

        /* MENSAGENS */
        .main-content { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .aba { display: none; height: 100%; flex-direction: column; }
        .aba.active { display: flex; }
        .feed { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 110px; }

        .msg-container { display: flex; flex-direction: column; max-width: 85%; margin-bottom: 5px; position: relative; }
        .me { align-self: flex-end; align-items: flex-end; }
        .outro { align-self: flex-start; align-items: flex-start; }
        
        .user-name { font-size: 11px; font-weight: 700; margin-bottom: 2px; color: var(--insta-blue); display: block; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; position: relative; border: 2px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-width: 80px; }
        
        .me .bubble { background: var(--msg-me); color: white; border-bottom-right-radius: 4px; }
        .outro .bubble { background: var(--msg-outro); color: var(--text); border-bottom-left-radius: 4px; border: 2px solid var(--border); }
        .msg-time { font-size: 9px; opacity: 0.6; align-self: flex-end; margin-top: 4px; display: block; text-align: right; }

        /* COORDENAÇÃO - CORES VIVAS */
        .coord-msg .bubble { background: var(--coord) !important; border: 2px solid var(--coord-border) !important; font-weight: 500; }

        /* MODAL DE CHAVE SECRETA */
        .modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.7); display: none; align-items: center; 
            justify-content: center; z-index: 10000; 
        }
        .modal-content { 
            background: var(--bg); padding: 25px; border-radius: 20px; 
            width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--border);
        }
        .modal-content h3 { margin-bottom: 15px; font-size: 18px; }
        .modal-content input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); 
            margin-bottom: 20px; outline: none; text-align: center; font-size: 16px;
        }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex:1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: var(--msg-outro); color: var(--text); }
        .btn-confirm { background: var(--insta-blue); color: white; }

        /* BARRA INSTAGRAM */
        .footer-input { position: fixed; bottom: 0; width: 100%; background: var(--bg); padding: 5px 12px calc(20px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); z-index: 9999; }
        .insta-bar { display: flex; align-items: center; gap: 10px; max-width: 600px; margin: 0 auto; }
        .cam-btn { background: var(--insta-blue); color: white; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .input-box { flex: 1; border: 1px solid var(--border); border-radius: 25px; display: flex; align-items: center; padding: 0 15px; background: transparent; }
        .input-box input { flex: 1; border: none; background: transparent; outline: none; padding: 12px 0; color: var(--text); font-size: 15px; }
        .send-btn { background: none; border: none; color: var(--insta-blue); font-weight: 700; cursor: pointer; padding: 5px; font-size: 16px; }

        .fab-theme { position: fixed; bottom: 120px; left: 20px; width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: white; border: none; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 20px; }
    </style>
</head>
<body class="light-mode">

    <div id="modalChave" class="modal-overlay">
        <div class="modal-content">
            <h3>Chave de Acesso</h3>
            <input type="password" id="inputChave" placeholder="Digite a chave...">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
                <button class="btn-confirm" onclick="validarChave()">Confirmar</button>
            </div>
        </div>
    </div>

    <nav class="top-menu">
        <div class="menu-scroll">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Mural</button>
            <button id="btn-avisos" onclick="mudarAba('avisos')">📢 Alertas</button>
            <button id="btn-agenda" onclick="mudarAba('agenda')">📅 Cronograma</button>
        </div>
    </nav>

    <header class="header-elite">
        <img src="logo.png" class="logo-fixa" onerror="this.src='https://via.placeholder.com/40'">
        <h2 style="font-size: 18px;">CETI José Marques</h2>
    </header>

    <main class="main-content">
        <section id="forum" class="aba active"><div id="feed-forum" class="feed"></div></section>
        <section id="mural" class="aba"><div id="feed-mural" class="feed"></div></section>
        <section id="avisos" class="aba"><div id="feed-avisos" class="feed"></div></section>
        <section id="agenda" class="aba"><div id="feed-agenda" class="feed"></div></section>

        <div class="footer-input">
            <div class="insta-bar">
                <div class="cam-btn">📷</div>
                <div class="input-box">
                    <input type="text" id="master-input" placeholder="Escreva uma mensagem...">
                </div>
                <button class="send-btn" onclick="tentarEnviar()">Enviar</button>
            </div>
        </div>
    </main>

    <button class="fab-theme" onclick="toggleTheme()">🌓</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdlHar22iODe81f-nrUi06PLWKQReb9Gc",
            authDomain: "siteescolaeduarda.firebaseapp.com",
            databaseURL: "https://siteescolaeduarda-default-rtdb.firebaseio.com",
            projectId: "siteescolaeduarda"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let nome = localStorage.getItem("nome") || prompt("Qual seu nome?") || "Aluno";
        localStorage.setItem("nome", nome);
        
        let abaAtual = 'forum';

        window.mudarAba = (id) => {
            abaAtual = id;
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.menu-scroll button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active-btn');
        };

        window.toggleTheme = () => document.body.classList.toggle('dark-mode');

        // LÓGICA DE ENVIO PROTEGIDA
        window.tentarEnviar = () => {
            const txt = document.getElementById('master-input').value.trim();
            if (!txt) return;

            if (abaAtual === 'avisos' || abaAtual === 'agenda') {
                document.getElementById('modalChave').style.display = 'flex';
                document.getElementById('inputChave').focus();
            } else {
                enviarParaFirebase(txt);
            }
        };

        window.fecharModal = () => {
            document.getElementById('modalChave').style.display = 'none';
            document.getElementById('inputChave').value = '';
        };

        window.validarChave = () => {
            const chave = document.getElementById('inputChave').value;
            const txt = document.getElementById('master-input').value.trim();
            
            if (chave === "Chernobyl") {
                enviarParaFirebase(txt, true);
                fecharModal();
            } else {
                alert("Chave Incorreta!");
                fecharModal();
            }
        };

        function enviarParaFirebase(texto, isCoord = false) {
            const refCaminho = (abaAtual === 'forum') ? "mensagens" : (abaAtual === 'mural' ? "ideias" : abaAtual);
            push(ref(db, refCaminho), {
                nome: isCoord ? "COORDENAÇÃO" : nome,
                texto: texto,
                timestamp: serverTimestamp()
            });
            document.getElementById('master-input').value = "";
        }

        // CARREGAR CHAT
        onValue(ref(db, "mensagens"), snap => {
            const feed = document.getElementById("feed-forum"); feed.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                const hora = d.timestamp ? new Date(d.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                const div = document.createElement("div");
                div.className = `msg-container ${d.nome === nome ? 'me' : 'outro'}`;
                div.innerHTML = `<span class="user-name">${d.nome}</span><div class="bubble">${d.texto}<span class="msg-time">${hora}</span></div>`;
                feed.appendChild(div);
            });
            feed.scrollTop = feed.scrollHeight;
        });

        // CARREGAR ALERTAS/AGENDA
        const carregarProtegido = (path, id) => {
            onValue(ref(db, path), snap => {
                const f = document.getElementById(id); f.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    const div = document.createElement("div");
                    div.className = "msg-container outro coord-msg";
                    div.innerHTML = `<span class="user-name">COORDENAÇÃO</span><div class="bubble">${d.texto}</div>`;
                    f.appendChild(div);
                });
            });
        };
        carregarProtegido("avisos", "feed-avisos");
        carregarProtegido("agenda", "feed-agenda");

    </script>
</body>
</html>
