<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI JM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <nav class="top-menu">
        <div class="menu-scroll">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Mural</button>
            <button id="btn-avisos" onclick="mudarAba('avisos')">📢 Alertas</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">📩 Opinião</button>
            <button id="btn-cronograma" onclick="mudarAba('cronograma')">📅 Agenda</button>
            <button id="btn-contatos" onclick="mudarAba('contatos')">📱 Contatos</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="header-escola">
                <img src="logo.png" class="logo-fixa">
                <div><h2>Direct CETI JM</h2><small style="color: #2e7d32;">● Ativo agora</small></div>
            </div>
            <div id="feed-forum" class="feed"></div>
            <div class="footer-input">
                <div class="input-wrapper">
                    <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                    <button class="send-btn" onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="emoji-grid">
                <div class="emoji-item" onclick="alert('Humor registrado!')"><span>😰</span><p>Ansioso</p><small>Inquieto ou nervoso</small></div>
                <div class="emoji-item" onclick="alert('Humor registrado!')"><span>😊</span><p>Feliz</p><small>Dia muito bom</small></div>
                <div class="emoji-item" onclick="alert('Humor registrado!')"><span>😢</span><p>Triste</p><small>Momento difícil</small></div>
                <div class="emoji-item" onclick="alert('Humor registrado!')"><span>😴</span><p>Cansado</p><small>Preciso descansar</small></div>
            </div>
        </section>

        <section id="avisos" class="aba">
            <div id="feed-avisos" class="feed"></div>
            <div class="footer-input">
                <div class="input-wrapper">
                    <input type="text" id="input-aviso" placeholder="Chave de Alerta...">
                    <button class="send-btn" onclick="salvarAviso()">Postar</button>
                </div>
            </div>
        </section>

        <section id="contatos" class="aba">
            <div class="contato-card" onclick="window.open('https://wa.me/5589981259467')">
                <strong>WhatsApp Ouvidoria</strong><p>(89) 98125-9467</p>
            </div>
            <div class="contato-card">
                <strong>E-mail Direção</strong><p>cetijm@escola.pi.gov.br</p>
            </div>
        </section>
    </main>

    <button class="fab-theme" onclick="toggleTheme()">🌓</button>
    <script type="module" src="script.js"></script>
</body>
</html>
