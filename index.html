<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ouvidoria - CETI JM</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="light-mode">
    <nav class="sidebar">
        <div class="nav-buttons">
            <button id="btn-forum" class="active-btn" onclick="mudarAba('forum')">💬 Chat</button>
            <button id="btn-mural" onclick="mudarAba('mural')">💡 Ideias</button>
            <button id="btn-feedback" onclick="mudarAba('feedback')">📝 Feedback</button>
            <button id="btn-avisos" onclick="mudarAba('avisos')">📢 Alertas</button>
            <button id="btn-sentimentos" onclick="mudarAba('sentimentos')">🎭 Humor</button>
            <button id="btn-cronograma" onclick="mudarAba('cronograma')">📅 Cronograma</button>
            <button id="btn-contatos" onclick="mudarAba('contatos')">📱 Contatos</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="forum" class="aba active">
            <div class="header-aba">
                <div class="logo-circle"><img src="logo.png"></div>
                <h2>Direct dos Alunos</h2>
            </div>
            <div id="feed-forum" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-msg" placeholder="Enviar mensagem...">
                    <button class="send-btn" onclick="salvarMensagem()">Enviar</button>
                </div>
            </div>
        </section>

        <section id="mural" class="aba">
            <div class="header-aba"><h2>💡 Mural de Ideias</h2></div>
            <div id="feed-mural" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-ideia" placeholder="Sugira algo divertido...">
                    <button class="send-btn" onclick="salvarIdeia()">Postar</button>
                </div>
            </div>
        </section>

        <section id="feedback" class="aba">
            <div class="header-aba"><h2>📝 Feedback Privado</h2></div>
            <div class="content-scroll p-20">
                <textarea id="texto-feedback" placeholder="Sua sugestão privada..."></textarea>
                <button class="btn-privado" onclick="enviarFeedback()">Enviar</button>
            </div>
        </section>

        <section id="avisos" class="aba">
            <div class="header-aba"><h2>📢 Alertas</h2></div>
            <div id="feed-avisos" class="feed"></div>
            <div class="footer-input">
                <div class="input-container">
                    <input type="text" id="input-aviso" placeholder="Postar (Senha necessária)...">
                    <button class="send-btn" onclick="salvarAviso()">Postar</button>
                </div>
            </div>
        </section>

        <section id="sentimentos" class="aba">
            <div class="header-aba"><h2>🎭 Humor</h2></div>
            <div class="emoji-grid-especial">
                <div class="emoji-item" onclick="votarHumor('😰')"><span>😰</span><p>Ansioso</p></div>
                <div class="emoji-item" onclick="votarHumor('🤯')"><span>🤯</span><p>Explodindo</p></div>
                <div class="emoji-item" onclick="votarHumor('😡')"><span>😡</span><p>Raiva</p></div>
                <div class="emoji-item" onclick="votarHumor('😢')"><span>😢</span><p>Triste</p></div>
                <div class="emoji-item" onclick="votarHumor('😴')"><span>😴</span><p>Preguiça</p></div>
                <div class="emoji-item" onclick="votarHumor('😊')"><span>😊</span><p>Feliz</p></div>
                <div class="emoji-item" onclick="votarHumor('🤩')"><span>🤩</span><p>Maravilhoso</p></div>
            </div>
        </section>

        <section id="cronograma" class="aba">
            <div class="header-aba"><h2>📅 Cronograma</h2></div>
            <div class="content-scroll p-20">
                <div class="card-evento olympics">01/05 - Abertura Olimpíadas 🥇</div>
            </div>
        </section>

        <section id="contatos" class="aba">
            <div class="header-aba"><h2>📱 Contatos</h2></div>
            <div class="content-scroll p-20">
                <a href="https://wa.me/5589981259467" class="card-contato">WhatsApp 📱</a>
                <a href="mailto:eduardabrito044@gmail.com" class="card-contato">E-mail ✉️</a>
            </div>
        </section>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
